substitutions:
  # Phases of the Voice Assistant
  # The voice assistant is ready to be triggered by a wake word
  voice_assist_idle_phase_id: '1'
  # The voice assistant is waiting for a voice command (after being triggered by the wake word)
  voice_assist_waiting_for_command_phase_id: '2'
  # The voice assistant is listening for a voice command
  voice_assist_listening_for_command_phase_id: '3'
  # The voice assistant is currently processing the command
  voice_assist_thinking_phase_id: '4'
  # The voice assistant is replying to the command
  voice_assist_replying_phase_id: '5'
  # The voice assistant is not ready
  voice_assist_not_ready_phase_id: '10'
  # The voice assistant encountered an error
  voice_assist_error_phase_id: '11'
  jack_connected_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/jack_connected.flac
  jack_disconnected_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/jack_disconnected.flac
  mute_switch_on_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/mute_switch_on.flac
  mute_switch_off_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/mute_switch_off.flac
  timer_finished_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
  wake_word_triggered_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac
  center_button_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_press.flac
  center_button_double_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_double_press.flac
  center_button_triple_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_triple_press.flac
  center_button_long_press_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/center_button_long_press.flac
  factory_reset_initiated_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/factory_reset_initiated.mp3
  factory_reset_cancelled_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/factory_reset_cancelled.mp3
  factory_reset_confirmed_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/factory_reset_confirmed.mp3
  error_cloud_expired_sound_file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/error_cloud_expired.mp3

globals:
  # Global variable tracking the phase of the voice assistant (defined above). Initialized to not_ready
  - id: voice_assistant_phase
    type: int
    restore_value: no
    # initial_value: ${voice_assist_not_ready_phase_id}

# ============================================
# SENSITIVITY SELECTORS (SEPARATE BLOCK)
# ============================================
select:
  # Remove the default sensitivity selector that came from the package
  # - id: !remove mww_sensitivity_select
  
  # Replacement selector for MWw_1
  - platform: template
    id: mww_sensitivity_select_1
    name: "WakeWord-1 Sensitivity"
    optimistic: true
    initial_option: "Moderately sensitive (210)"
    restore_value: true
    entity_category: config
    options:
      - Ultra insensitive (250)
      - Maximum insensitive (240)
      - Less insensitive (235)
      - Slightly insensitive (230)
      - Least insensitive (225)
      - Moderately sensitive (210)
      - Slightly sensitive (200)
      - Least sensitive (190)
      - Very sensitive (180)
      - Extremely sensitive (170)
      - Maximum sensitive (160)
    on_value:
      lambda: |-
        if (x == "Ultra insensitive (250)") {
          id(kira).set_probability_cutoff(250);
        } else if (x == "Maximum insensitive (240)") {
          id(kira).set_probability_cutoff(240);
        } else if (x == "Less insensitive (235)") {
          id(kira).set_probability_cutoff(235);
        } else if (x == "Slightly insensitive (230)") {
          id(kira).set_probability_cutoff(230);
        } else if (x == "Least insensitive (225)") {
          id(kira).set_probability_cutoff(225);
        } else if (x == "Moderately sensitive (210)") {
          id(kira).set_probability_cutoff(210);
        } else if (x == "Slightly sensitive (200)") {
          id(kira).set_probability_cutoff(200);
        } else if (x == "Least sensitive (190)") {
          id(kira).set_probability_cutoff(190);
        } else if (x == "Very sensitive (180)") {
          id(kira).set_probability_cutoff(180);
        } else if (x == "Extremely sensitive (170)") {
          id(kira).set_probability_cutoff(170);
        } else if (x == "Maximum sensitive (160)") {
          id(kira).set_probability_cutoff(160);
        }

  # Replacement selector for MWw_2
  - platform: template
    id: mww_sensitivity_select_2
    name: "WakeWord-2 Sensitivity"
    optimistic: true
    initial_option: "Moderately sensitive (210)"
    restore_value: true
    entity_category: config
    options:
      - Ultra insensitive (250)
      - Maximum insensitive (240)
      - Less insensitive (235)
      - Slightly insensitive (230)
      - Least insensitive (225)
      - Moderately sensitive (210)
      - Slightly sensitive (200)
      - Least sensitive (190)
      - Very sensitive (180)
      - Extremely sensitive (170)
      - Maximum sensitive (160)
    on_value:
      lambda: |-
        if (x == "Ultra insensitive (250)") {
          id(frenzy).set_probability_cutoff(250);
        } else if (x == "Maximum insensitive (240)") {
          id(frenzy).set_probability_cutoff(240);
        } else if (x == "Less insensitive (235)") {
          id(frenzy).set_probability_cutoff(235);
        } else if (x == "Slightly insensitive (230)") {
          id(frenzy).set_probability_cutoff(230);
        } else if (x == "Least insensitive (225)") {
          id(frenzy).set_probability_cutoff(225);
        } else if (x == "Moderately sensitive (210)") {
          id(frenzy).set_probability_cutoff(210);
        } else if (x == "Slightly sensitive (200)") {
          id(frenzy).set_probability_cutoff(200);
        } else if (x == "Least sensitive (190)") {
          id(frenzy).set_probability_cutoff(190);
        } else if (x == "Very sensitive (180)") {
          id(frenzy).set_probability_cutoff(180);
        } else if (x == "Extremely sensitive (170)") {
          id(frenzy).set_probability_cutoff(170);
        } else if (x == "Maximum sensitive (160)") {
          id(frenzy).set_probability_cutoff(160);
        }

microphone:
  - platform: i2s_audio
    id: sat1_mics_raw
    sample_rate: 48000
    i2s_din_pin: GPIO15
    bits_per_sample: 32bit
    channel: stereo
    pdm: false
    adc_type: external
    i2s_audio_id: i2s_shared

  - platform: resampler
    id: sat1_mics
    microphone:
      microphone: sat1_mics_raw
      channels: [0]
    sample_rate: 16000
    buffer_duration: 100ms

micro_wake_word:
  id: mww
  microphone:
    microphone: sat1_mics
    channels: 0
    gain_factor: 7
  stop_after_detection: false
  models:
    - model: github://artfix/microWakeWords/microWakeWords/kira.json@main
      id: kira
    - model: github://artfix/microWakeWords/microWakeWordsV2/frenzy.json@main
      id: frenzy
    # - model: hey_mycroft
    #   id: hey_mycroft
    - model: https://github.com/kahrendt/microWakeWord/releases/download/stop/stop.json
      id: stop
      internal: true
  vad:
  on_wake_word_detected:
    # If the wake word is detected when the device is muted (Possible with the software mute switch): Do nothing
    - if:
        condition:
          switch.is_off: master_mute_switch
        then:
          # If a timer is ringing: Stop it, do not start the voice assistant (We can stop timer from voice!)
          - if:
              condition:
                switch.is_on: timer_ringing
              then:
                - switch.turn_off: timer_ringing
              # Stop voice assistant if running
              else:
                - if:
                    condition:
                      voice_assistant.is_running:
                    then:
                      voice_assistant.stop:
                    # Stop any other media player announcement
                    else:
                      - if:
                          condition:
                            media_player.is_announcing:
                              id: external_media_player
                          then:
                            - media_player.stop:
                                announcement: true
                                id: external_media_player
                          # Start the voice assistant and play the wake sound, if enabled
                          else:
                            - if:
                                condition:
                                  switch.is_on: wake_sound
                                then:
                                  - script.execute:
                                      id: play_sound
                                      priority: true
                                      sound_file: "wake_word_triggered_sound"
                                  - delay: 300ms
                            - voice_assistant.start:
                                wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  microphone:
    microphone: sat1_mics
    channels: 0

  media_player: external_media_player
  micro_wake_word: mww
  use_wake_word: false
  noise_suppression_level: 0
  auto_gain: 0 dbfs
  volume_multiplier: 1
  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - micro_wake_word.start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds
  on_client_disconnected:
    - voice_assistant.stop:
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: control_leds
  on_error:
    # Only set the error phase if the error code is different than duplicate_wake_up_detected or stt-no-text-recognized
    # These two are ignored for a better user experience
    - if:
        condition:
          and:
            - lambda: return !id(init_in_progress);
            - lambda: return code != "duplicate_wake_up_detected";
            - lambda: return code != "stt-no-text-recognized";
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: control_leds
    # If the error code is cloud-auth-failed, serve a local audio file guiding the user.
    - if:
        condition:
          - lambda: return code == "cloud-auth-failed";
        then:
          - script.execute:
              id: play_sound
              priority: true
              sound_file: "error_cloud_expired"

  # When the voice assistant starts
  on_start:
    # Apply audio ducking to reduce media volume during voice interaction
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 20
        duration: 0.0s
  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_waiting_for_command_phase_id};
    - script.execute: control_leds
  on_stt_vad_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_for_command_phase_id};
    - script.execute: control_leds
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: control_leds
  on_intent_progress:
    - if:
        condition:
          # A nonempty x variable means a streaming TTS url was sent to the media player
          lambda: 'return !x.empty();'
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: control_leds
          # Start a script that would potentially enable the stop word if the response is longer than a second
          - script.execute: activate_stop_word_once
  on_tts_start:
    - if:
        condition:
          # The intent_progress trigger didn't start the TTS Reponse
          lambda: 'return id(voice_assistant_phase) != ${voice_assist_replying_phase_id};'
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: control_leds
          # Start a script that would potentially enable the stop word if the response is longer than a second
          - script.execute: activate_stop_word_once
  # When the voice assistant ends ...
  on_end:
    - wait_until:
        not:
          voice_assistant.is_running:
    # Stop ducking audio.
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 0
        duration: 1.0s
    # If the end happened because of an error, let the error phase on for a second
    - if:
        condition:
          lambda: return id(voice_assistant_phase) == ${voice_assist_error_phase_id};
        then:
          - delay: 1s
    # Reset the voice assistant phase id and reset the LED animations.
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds

  on_timer_finished:
    - switch.turn_on: timer_ringing
  on_timer_started:
    - script.execute: control_leds
  on_timer_cancelled:
    - script.execute: control_leds
  on_timer_updated:
    - script.execute: control_leds
  on_timer_tick:
    - script.execute: control_leds

script:
  - id: activate_stop_word_once
    then:
      - delay: 1s
      # Enable stop wake word
      - if:
          condition:
            switch.is_off: timer_ringing
          then:
            - micro_wake_word.enable_model: stop
            - wait_until:
                not:
                  media_player.is_announcing: external_media_player
            - if:
                condition:
                  switch.is_off: timer_ringing
                then:
                  - micro_wake_word.disable_model: stop
