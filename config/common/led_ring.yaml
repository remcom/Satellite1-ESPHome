globals:
  # Global index for our LEDs. So that switching between different animation does not lead to unwanted effects.
  - id: global_led_animation_index
    type: int
    restore_value: no
    initial_value: '0'
  # Global variable tracking if the jack has been plugged touched.
  - id: jack_plugged_recently
    type: bool
    restore_value: no
    initial_value: 'false'
  # Global variable tracking if the jack has been unplugged touched.
  - id: jack_unplugged_recently
    type: bool
    restore_value: no
    initial_value: 'false'

light:
  # Hardware LED ring. Not used because remapping needed
  - platform: esp32_rmt_led_strip
    id: hw_led_ring
    pin: GPIO21
    num_leds: 24
    rgb_order: GRB
    chipset: WS2812

  # User facing LED ring. Remapping of the hardware LEDs.
  # Exposed to be used by the user.
  - platform: partition
    id: led_ring
    name: LED Ring
    entity_category: config
    icon: "mdi:dots-circle"
    default_transition_length: 0ms
    restore_mode: RESTORE_DEFAULT_OFF
    initial_state:
      color_mode: rgb
      brightness: 66%
      red: 9.4%
      green: 73.3%
      blue: 94.9%
    segments:
      - id: hw_led_ring
        from: 0
        to: 23

  # Voice Assistant LED ring. Remapping of the hardware LED.
  # This light is not exposed. The device controls it
  - platform: partition
    id: voice_assistant_leds
    internal: true
    default_transition_length: 0ms
    segments:
      - id: hw_led_ring
        from: 0
        to: 23
    effects:
      - addressable_lambda:
          name: "Waiting for Command"
          update_interval: 100ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (int i = 0; i < 24; i++) {
              if (i == id(global_led_animation_index) % 24) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 23) % 24) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 22) % 24) {
                it[i] = color * 128;
              } else if (i == (id(global_led_animation_index) + 12) % 24) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 11) % 24) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 10) % 24) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }
            id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 24;
      - addressable_lambda:
          name: "Listening For Command"
          update_interval: 50ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (int i = 0; i < 24; i++) {
              if (i == id(global_led_animation_index) % 24) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 23) % 24) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 22) % 24) {
                it[i] = color * 128;
              } else if (i == (id(global_led_animation_index) + 12) % 24) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 11) % 24) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 10) % 24) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }
            id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 24;
      - addressable_lambda:
          name: "Thinking"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (int i = 0; i < 24; i++) {
              if (i == id(global_led_animation_index) % 24) {
                it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
              } else if (i == (id(global_led_animation_index) + 12) % 24) {
                it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
              } else {
                it[i] = Color::BLACK;
              }
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Replying"
          update_interval: 50ms
          lambda: |-
            id(global_led_animation_index) = (24 + id(global_led_animation_index) - 1) % 24;
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (int i = 0; i < 24; i++) {
              if (i == (id(global_led_animation_index)) % 24) {
                it[i] = color;
              } else if (i == ( id(global_led_animation_index) + 1) % 24) {
                it[i] = color * 192;
              } else if (i == ( id(global_led_animation_index) + 2) % 24) {
                it[i] = color * 128;
              } else if (i == ( id(global_led_animation_index) + 12) % 24) {
                it[i] = color;
              } else if (i == ( id(global_led_animation_index) + 13) % 24) {
                it[i] = color * 192;
              } else if (i == ( id(global_led_animation_index) + 14) % 24) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }
      - addressable_lambda:
          name: "Muted or Silent"
          update_interval: 16ms
          lambda: |-
            static int8_t index = 0;
            Color muted_color(255, 0, 0);
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (int i = 0; i < 24; i++) {
              if ( light_color.get_state() ) {
                it[i] = color;
              } else {
                it[i] = Color::BLACK;
              }
            }
            if ( id(master_mute_switch).state ) {
              it[23] = Color::BLACK;
              it[0] = muted_color;
              it[1] = Color::BLACK;
              it[5] = Color::BLACK;
              it[6] = muted_color;
              it[7] = Color::BLACK;
              it[11] = Color::BLACK;
              it[12] = muted_color;
              it[13] = Color::BLACK;
              it[17] = Color::BLACK;
              it[18] = muted_color;
              it[19] = Color::BLACK;
            }
            if ( id(external_media_player).is_muted() ) {
              it[1] = Color::BLACK;
              it[2] = muted_color;
              it[3] = muted_color;
              it[4] = muted_color;
              it[5] = Color::BLACK;
              it[7] = Color::BLACK;
              it[8] = muted_color;
              it[9] = muted_color;
              it[10] = muted_color;
              it[11] = Color::BLACK;
              it[13] = Color::BLACK;
              it[14] = muted_color;
              it[15] = muted_color;
              it[16] = muted_color;
              it[17] = Color::BLACK;
              it[19] = Color::BLACK;
              it[20] = muted_color;
              it[21] = muted_color;
              it[22] = muted_color;
              it[23] = Color::BLACK;
            }
      - addressable_lambda:
          name: "Volume Display"
          update_interval: 50ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            auto volume_ratio = 24.0f * id(external_media_player).volume;
            for (int i = 0; i < 24; i++) {
              if (i <= volume_ratio) {
                it[(0+i)%24] = color * min( 255.0f * (volume_ratio - i) , 255.0f ) ;
              } else {
                it[(0+i)%24] = Color::BLACK;
              }
            }
      - addressable_lambda:
          name: "Music Visualizer"
          update_interval: 33ms
          lambda: |-
            static float level_smoothed = 0.0f;
            static float peak_hold = 0.0f;
            static uint8_t peak_age = 0;
            if (initial_run) {
              level_smoothed = 0.0f;
              peak_hold = 0.0f;
              peak_age = 0;
            }
            // Only one speaker receives data at a time (router), so take the max of both
            float level = max( id(i2s_tas2780_speaker)->get_audio_level(),
                               id(i2s_pcm5122_speaker)->get_audio_level() );
            // Perceptual curve so quiet passages still register
            level = sqrtf(level);
            // Fast attack, slow decay
            if (level > level_smoothed) {
              level_smoothed += 0.6f * (level - level_smoothed);
            } else {
              level_smoothed += 0.15f * (level - level_smoothed);
            }
            // Peak-hold dot that decays after ~330ms
            if (level_smoothed >= peak_hold) {
              peak_hold = level_smoothed;
              peak_age = 0;
            } else if (++peak_age > 10) {
              peak_hold = max( peak_hold - 0.03f, level_smoothed );
            }
            auto light_color = id(led_ring).current_values;
            Color ring_color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            int color_mode = id(music_visualizer_color_mode).active_index().value_or(0);
            float lit = 24.0f * level_smoothed;
            for (int i = 0; i < 24; i++) {
              Color color = ring_color;
              if (color_mode == 1) {  // Rainbow: hue follows position around the ring
                color = light::ESPHSVColor(i * 255 / 24, 255, 255).to_rgb();
              } else if (color_mode == 2) {  // Level Gradient: classic green -> yellow -> red VU
                float f = i / 23.0f;
                color = Color(min(255, (int)(510 * f)), min(255, (int)(510 * (1.0f - f))), 0);
              }
              if (i < lit) {
                it[i] = color * min( 255.0f * (lit - i) , 255.0f );
              } else {
                it[i] = Color::BLACK;
              }
              if (i == min( static_cast<int>(24.0f * peak_hold) , 23 ) && i > lit) {
                it[i] = color;
              }
            }
      - addressable_lambda:
          name: "Music Spectrum"
          update_interval: 33ms
          lambda: |-
            static float levels[3] = {0.0f, 0.0f, 0.0f};
            if (initial_run) {
              levels[0] = levels[1] = levels[2] = 0.0f;
            }
            // Makeup gain per band: treble peaks are naturally much smaller than bass
            const float gains[3] = {1.0f, 2.2f, 3.5f};
            float raw[3] = {
              max( id(i2s_tas2780_speaker)->get_audio_level_bass(), id(i2s_pcm5122_speaker)->get_audio_level_bass() ),
              max( id(i2s_tas2780_speaker)->get_audio_level_mid(), id(i2s_pcm5122_speaker)->get_audio_level_mid() ),
              max( id(i2s_tas2780_speaker)->get_audio_level_treble(), id(i2s_pcm5122_speaker)->get_audio_level_treble() )
            };
            auto light_color = id(led_ring).current_values;
            Color ring_color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            int color_mode = id(music_visualizer_color_mode).active_index().value_or(0);
            // Fixed hues per band for rainbow mode: bass red, mid green, treble blue
            const uint8_t band_hues[3] = {0, 96, 170};
            for (int b = 0; b < 3; b++) {
              float level = min( sqrtf(raw[b] * gains[b]) , 1.0f );
              // Fast attack, slow decay
              if (level > levels[b]) {
                levels[b] += 0.6f * (level - levels[b]);
              } else {
                levels[b] += 0.15f * (level - levels[b]);
              }
              // Each band fills an 8-LED arc: bass 0-7, mid 8-15, treble 16-23
              float lit = 8.0f * levels[b];
              for (int j = 0; j < 8; j++) {
                Color color = ring_color;
                if (color_mode == 1) {  // Rainbow: one hue per band
                  color = light::ESPHSVColor(band_hues[b], 255, 255).to_rgb();
                } else if (color_mode == 2) {  // Level Gradient within each arc
                  float f = j / 7.0f;
                  color = Color(min(255, (int)(510 * f)), min(255, (int)(510 * (1.0f - f))), 0);
                }
                if (j < lit) {
                  it[b * 8 + j] = color * min( 255.0f * (lit - j) , 255.0f );
                } else {
                  it[b * 8 + j] = Color::BLACK;
                }
              }
            }
      - addressable_lambda:
          name: "Music Pulse"
          update_interval: 33ms
          lambda: |-
            static float level_smoothed = 0.0f;
            static uint8_t rainbow_hue = 0;
            if (initial_run) {
              level_smoothed = 0.0f;
              rainbow_hue = 0;
            }
            float level = max( id(i2s_tas2780_speaker)->get_audio_level(),
                               id(i2s_pcm5122_speaker)->get_audio_level() );
            level = sqrtf(level);
            // Fast attack, slow decay
            if (level > level_smoothed) {
              level_smoothed += 0.6f * (level - level_smoothed);
            } else {
              level_smoothed += 0.1f * (level - level_smoothed);
            }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            int color_mode = id(music_visualizer_color_mode).active_index().value_or(0);
            if (color_mode == 1) {  // Rainbow: hue drifts, sped up by the music level
              rainbow_hue += 1 + (uint8_t)(6.0f * level_smoothed);
              color = light::ESPHSVColor(rainbow_hue, 255, 255).to_rgb();
            } else if (color_mode == 2) {  // Level Gradient: green when quiet, red when loud
              color = Color(min(255, (int)(510 * level_smoothed)),
                            min(255, (int)(510 * (1.0f - level_smoothed))), 0);
            }
            for (int i = 0; i < 24; i++) {
              it[i] = color * (uint8_t)(255.0f * level_smoothed);
            }
      - addressable_lambda:
          name: "Action Button Touched"
          update_interval: 16ms
          lambda: |-
            if (initial_run) {
              // set voice_assistant_leds light to colors based on led_ring
              auto led_ring_cv = id(led_ring).current_values;
              auto va_leds_call = id(voice_assistant_leds).make_call();
              va_leds_call.from_light_color_values(led_ring_cv);
              va_leds_call.set_brightness( min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f ) );
              va_leds_call.set_state(true);
              va_leds_call.perform();
            }
            auto light_color = id(voice_assistant_leds).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (int i = 0; i < 24; i++) {
              it[i] = color;
            }
      - addressable_twinkle:
          name: "Twinkle"
          twinkle_probability: 50%
      - addressable_lambda:
          name: "Error"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            Color error_color(255, 0, 0);
            for (int i = 0; i < 24; i++) {
              it[i] = error_color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Success"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            static uint8_t counter = 0;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
              counter = 0;
            }
            Color error_color(0, 255, 0);
            for (int i = 0; i < 24; i++) {
              it[i] = error_color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }

      - addressable_lambda:
          name: "Warning"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            static uint8_t blink_count = 0;  // New counter for blink cycles
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
              blink_count = 0;
            }
            Color error_color(255, 0, 0);
            if (blink_count < 5) {  // Only blink 5 times
              for (int i = 0; i < 24; i++) {
                it[i] = error_color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
              }
              if (brightness_decreasing) {
                brightness_step++;
              } else {
                brightness_step--;
              }
              if (brightness_step == 0 || brightness_step == brightness_step_number) {
                brightness_decreasing = !brightness_decreasing;
                if (brightness_step == 0) {  // Completed one blink cycle
                  blink_count++;
                }
              }
            } else {
              // Turn off LEDs after 5 blinks
              for (int i = 0; i < 24; i++) {
                it[i] = Color(0, 0, 0);
              }
            }
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%

      - addressable_lambda:
          name: "Timer Ring"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            Color muted_color(255, 0, 0);
            for (int i = 0; i < 24; i++) {
              it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if ( id(master_mute_switch).state ) {
              it[3] = muted_color;
              it[9] = muted_color;
            }
            if (brightness_decreasing) {
              brightness_step++;
            } else {
              brightness_step--;
            }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Timer Tick"
          update_interval: 100ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            Color muted_color(255, 0, 0);
            auto timer_ratio = 24.0f * id(first_active_timer).seconds_left / max(id(first_active_timer).total_seconds , static_cast<uint32_t>(1));
            uint8_t last_led_on = static_cast<uint8_t>(ceil(timer_ratio)) - 1;
            for (int i = 0; i < 24; i++) {
              float brightness_dip = ( i == id(global_led_animation_index) % 24 && i != last_led_on ) ? 0.9f : 1.0f ;
              if (i <= timer_ratio) {
                it[i] = color * min (255.0f * brightness_dip * (timer_ratio - i) , 255.0f * brightness_dip) ;
              } else {
                it[i] = Color::BLACK;
              }
            }
            if (id(master_mute_switch).state) {
              it[2] = Color::BLACK;
              it[3] = muted_color;
              it[4] = Color::BLACK;
              it[8] = Color::BLACK;
              it[9] = muted_color;
              it[10] = Color::BLACK;
            }
            id(global_led_animation_index) = (24 + id(global_led_animation_index) - 1) % 24;
      - addressable_rainbow:
          name: "Rainbow"
          width: 24
      - addressable_lambda:
          name: "Tick"
          update_interval: 333ms
          lambda: |-
            static uint8_t index = 0;
            Color color(255, 0, 0);
            if (initial_run) {
              index = 0;
            }
            for (int i = 0; i < 24; i++) {
              if (i <= index ) {
                it[i] = Color::BLACK;
              } else {
                it[i] = color;
              }
            }
            index = (index + 1) % 24;
      - addressable_lambda:
          name: "Flashing XMOS"
          update_interval: 333ms
          lambda: |-
            static uint8_t index = 0;
            Color color(0, 0, 255);
            if (initial_run) {
              index = 0;
            }
            for (int i = 0; i < 24; i++) {
              if (i <= index ) {
                it[i] = Color::BLACK;
              } else {
                it[i] = color;
              }
            }
            index = id(global_led_animation_index) % 24;
      - addressable_lambda:
          name: "Factory Reset Coming Up"
          update_interval: 500ms
          lambda: |-
            static uint8_t index = 0;
            Color color(255, 0, 0);
            if (initial_run) {
              index = 0;
            }
            for (int i = 0; i < 24; i++) {
              if (i <= index ) {
                it[i] = color;
              } else {
                it[i] = Color::BLACK;
              }
            }
            index = (index + 1) % 24;
      - addressable_lambda:
          name: "Jack Plugged"
          update_interval: 40ms
          lambda: |-
              static uint8_t index = 0;
              if (initial_run) {
                index = 0;
              }
              auto light_color = id(led_ring).current_values;
              Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                    light_color.get_blue() * 255);
              if (index <= 12) {
                for (int i = 0; i < 24; i++) {
                  if (i == index) {
                    it[i] = color;
                  } else if (i == (24 - index) % 24) {
                    it[i] = color;
                  } else {
                    it[i] = Color::BLACK;
                  }
                }
              }
              index = (index + 1);
      - addressable_lambda:
          name: "Jack Unplugged"
          update_interval: 40ms
          lambda: |-
              static uint8_t index = 0;
              if (initial_run) {
                index = 0;
              }
              auto light_color = id(led_ring).current_values;
              Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                    light_color.get_blue() * 255);
              if (index <= 12) {
                for (int i = 0; i < 24; i++) {
                  if (i == 12 - index) {
                    it[i] = color;
                  } else if (i == (12 + index) % 24) {
                    it[i] = color;
                  } else {
                    it[i] = Color::BLACK;
                  }
                }
              }
              index = (index + 1);

switch:
  # User-facing option: when on, the LED ring visualizes the music level during playback
  - platform: template
    name: "Music Visualizer"
    id: music_visualizer_switch
    icon: "mdi:chart-bar"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    # Guard: restore fires this during setup(), before the LED strip buffer exists
    on_turn_on:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - script.execute: control_leds
    on_turn_off:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - script.execute: control_leds

select:
  # Visualizer style: how the ring reacts to the music
  - platform: template
    name: "Music Visualizer Style"
    id: music_visualizer_style
    icon: "mdi:chart-histogram"
    entity_category: config
    options:
      - "VU Meter"
      - "Spectrum"
      - "Pulse"
    initial_option: "VU Meter"
    optimistic: true
    restore_value: true
    # Guard: restore fires this during setup(), before the LED strip buffer exists
    on_value:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - script.execute: control_leds

  # Visualizer colors: what palette the effects draw with
  - platform: template
    name: "Music Visualizer Color"
    id: music_visualizer_color_mode
    icon: "mdi:palette"
    entity_category: config
    options:
      - "Ring Color"
      - "Rainbow"
      - "Level Gradient"
    initial_option: "Ring Color"
    optimistic: true
    restore_value: true
    # Guard: restore fires this during setup(), before the LED strip buffer exists
    on_value:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - script.execute: control_leds

script:
  # Master script controlling the LEDs, based on different conditions : initialization in progress, wifi and api connected and voice assistant phase.
  # For the sake of simplicity and re-usability, the script calls child scripts defined below.
  # This script will be called every time one of these conditions is changing.
  - id: control_leds
    then:
      - lambda: |
          id(check_if_timers_active).execute();
          if (id(is_timer_active)){
            id(fetch_first_active_timer).execute();
          }
          if (id(xmos_flashing_state) > 0) {
            id(control_leds_xmos_flasher_state_update).execute();
          } else if (id(improv_ble_in_progress)) {
            id(control_leds_improv_ble_state).execute();
          } else if (id(init_in_progress)) {
            id(control_leds_init_state).execute();
          } else if (!id(wifi_id).is_connected() || !id(api_id).is_connected()){
            id(control_leds_no_ha_connection_state).execute();
          } else if (id(volume_buttons_touched)) {
            id(control_leds_volume_buttons_touched).execute();
          } else if (id(btn_action).state) {
            id(control_leds_action_button_touched).execute();
          } else if (id(jack_plugged_recently)) {
            id(control_leds_jack_plugged_recently).execute();
          } else if (id(jack_unplugged_recently)) {
            id(control_leds_jack_unplugged_recently).execute();
          } else if (id(warning)) {
            id(control_leds_warning).execute();
          } else if (id(timer_ringing).state) {
            id(control_leds_timer_ringing).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_waiting_for_command_phase_id}) {
            id(control_leds_voice_assistant_waiting_for_command_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_listening_for_command_phase_id}) {
            id(control_leds_voice_assistant_listening_for_command_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_thinking_phase_id}) {
            id(control_leds_voice_assistant_thinking_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_replying_phase_id}) {
            id(control_leds_voice_assistant_replying_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_error_phase_id}) {
            id(control_leds_voice_assistant_error_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_not_ready_phase_id}) {
            id(control_leds_voice_assistant_not_ready_phase).execute();
          } else if (id(is_timer_active)) {
            id(control_leds_timer_ticking).execute();
          } else if (id(master_mute_switch).state) {
            id(control_leds_muted_or_silent).execute();
          } else if (id(external_media_player).is_muted()) {
            id(control_leds_muted_or_silent).execute();
          } else if (id(music_visualizer_switch).state &&
                     id(external_media_player).state == media_player::MediaPlayerState::MEDIA_PLAYER_STATE_PLAYING) {
            id(control_leds_music_visualizer).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_idle_phase_id}) {
            id(control_leds_voice_assistant_idle_phase).execute();
          }

  # Script executed during Improv BLE
  # Warm White Twinkle
  - id: control_leds_improv_ble_state
    then:
      - light.turn_on:
          brightness: 66%
          red: 100%
          green: 89%
          blue: 71%
          id: voice_assistant_leds
          effect: "Twinkle"

  # Script executed during initialization
  # Blue Twinkle if Wifi is connected, Else solid warm white
  - id: control_leds_init_state
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_on:
                brightness: 66%
                red: 9.4%
                green: 73.3%
                blue: 94.9%
                id: voice_assistant_leds
                effect: "Twinkle"
          else:
            - light.turn_on:
                brightness: 33%
                red: 100%
                green: 89%
                blue: 71%
                id: voice_assistant_leds
                effect: "none"

  # Script executed when the device has no connection to Home Assistant
  # Red Twinkle (This will be visible during HA updates for example)
  - id: control_leds_no_ha_connection_state
    then:
      - light.turn_on:
          brightness: 66%
          red: 1
          green: 0
          blue: 0
          id: voice_assistant_leds
          effect: "Twinkle"

  # Script executed when the voice assistant is idle (waiting for a wake word)
  # Nothing (Either LED ring off or LED ring on if the user decided to turn the user facing LED ring on)
  - id: control_leds_voice_assistant_idle_phase
    then:
      - light.turn_off: voice_assistant_leds
      - if:
          condition:
            light.is_on: led_ring
          then:
            light.turn_on: led_ring

  # Script executed when the voice assistant is waiting for a command (After the wake word)
  # Slow clockwise spin of the LED ring.
  - id: control_leds_voice_assistant_waiting_for_command_phase
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Waiting for Command"

  # Script executed when the voice assistant is listening to a command
  # Fast clockwise spin of the LED ring.
  - id: control_leds_voice_assistant_listening_for_command_phase
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Listening For Command"

  # Script executed when the voice assistant is thinking to a command
  # The spin stops and the 2 LEDs that are currently on and blinking indicating the commend is being processed.
  - id: control_leds_voice_assistant_thinking_phase
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Thinking"

  # Script executed when the voice assistant is thinking to a command
  # Fast anticlockwise spin of the LED ring.
  - id: control_leds_voice_assistant_replying_phase
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Replying"

  # Script executed when the voice assistant is in error
  # Fast Red Pulse
  - id: control_leds_voice_assistant_error_phase
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          red: 1
          green: 0
          blue: 0
          id: voice_assistant_leds
          effect: "Error"
      - delay: 2s
      - script.execute: control_leds

  # Script executed when the voice assistant requires user action
  # 5 Fast Red Pulses
  - id: control_leds_warning
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          red: 1
          green: 0
          blue: 0
          id: voice_assistant_leds
          effect: "Warning"
      - delay: 2s
      - lambda: id(warning) = false;
      - script.execute: control_leds

  # Script executed when the voice assistant is muted or silent
  # The LED next to the 2 microphones turn red / one red LED next to the speaker grill
  - id: control_leds_muted_or_silent
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          id: voice_assistant_leds
          effect: "Muted or Silent"

  # Script executed when the voice assistant is not ready
  - id: control_leds_voice_assistant_not_ready_phase
    then:
      - light.turn_on:
          brightness: 66%
          red: 1
          green: 0
          blue: 0
          id: voice_assistant_leds
          effect: "Twinkle"

  # Script executed when the volume button is touched
  # A number of LEDs turn on indicating a visual representation of the volume of the media player entity.
  - id: control_leds_volume_buttons_touched
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          id: voice_assistant_leds
          effect: "Volume Display"

  # Script executed when the jack has just been unplugged
  # A ripple effect
  - id: control_leds_jack_unplugged_recently
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          id: voice_assistant_leds
          effect: "Jack Unplugged"

  # Script executed when the jack has just been plugged
  # A ripple effect
  - id: control_leds_jack_plugged_recently
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: "Jack Plugged"

  # Script executed while music is playing and the visualizer option is enabled
  # The LED ring visualizes the playback audio level in the selected style.
  - id: control_leds_music_visualizer
    then:
      - light.turn_on:
          brightness: !lambda return max( id(led_ring).current_values.get_brightness() , 0.2f );
          id: voice_assistant_leds
          effect: !lambda |-
            switch (id(music_visualizer_style).active_index().value_or(0)) {
              case 1: return std::string("Music Spectrum");
              case 2: return std::string("Music Pulse");
              default: return std::string("Music Visualizer");
            }

  # Script executed when the center button is touched
  # The complete LED ring turns on
  - id: control_leds_action_button_touched
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          id: voice_assistant_leds
          effect: "Action Button Touched"

  # Script executed when the timer is ringing, to control the LEDs
  # The LED ring blinks.
  - id: control_leds_timer_ringing
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          id: voice_assistant_leds
          effect: "Timer Ring"

  # Script executed when the timer is ticking, to control the LEDs
  # The LEDs shows the remaining time as a fraction of the full ring.
  - id: control_leds_timer_ticking
    then:
      - light.turn_on:
          brightness: !lambda return min ( max( id(led_ring).current_values.get_brightness() , 0.2f ) + 0.1f , 1.0f );
          id: voice_assistant_leds
          effect: "Timer tick"

  # Script executed when the timer is ticking, to control the LEDs
  # The LEDs shows the remaining time as a fraction of the full ring.
  - id: control_leds_xmos_flasher_state_update
    then:
      - if:
          condition:
            lambda: 'return id(xmos_flashing_state) == 1;'
          then:
            - light.turn_on:
                brightness: !lambda return .6f ;
                id: voice_assistant_leds
                effect: "Flashing XMOS"
          else:
            - light.turn_on:
                brightness: !lambda return .6f ;
                id: voice_assistant_leds
                effect: !lambda 'return id(xmos_flashing_state) == 3 ? "Error" : "Success" ;'
            - delay: 1s
            - light.turn_off:
                id: voice_assistant_leds
