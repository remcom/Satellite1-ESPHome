name: "Close stale issues/pull requests"
on:
  schedule:
  - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/stale@v10
      with:
        stale-issue-message: 'This issue is stale because it has been open 30 days with no activity. Remove the stale label or comment to keep it open, or it will be closed in 7 days.'
        stale-pr-message: 'This pull request is stale because it has been open 30 days with no activity. Remove the stale label or comment to keep it open, or it will be closed in 7 days.'
        close-issue-message: 'This issue was closed because it has been inactive for 7 days since being marked as stale.'
        close-pr-message: 'This pull request was closed because it has been inactive for 7 days since being marked as stale.'
        days-before-stale: 30
        days-before-close: 7
        operations-per-run: 500
        exempt-issue-labels: 'no-stale,enhancement,new-feature,maintenance,in-progress'
        exempt-pr-labels: 'no-stale,in-progress'